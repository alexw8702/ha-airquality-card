<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Air Quality Card - Neue Design Vorschläge (Light & Dark)</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #11141a;
      color: #e2e8f0;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }

    header {
      width: 100%;
      background: #0b0d11;
      padding: 20px;
      text-align: center;
      border-bottom: 1px solid #1e293b;
      box-shadow: 0 4px 6px rgba(0,0,0,0.15);
    }

    header h1 {
      margin: 0;
      font-size: 24px;
      font-weight: 600;
    }

    header p {
      margin: 5px 0 0 0;
      font-size: 14px;
      color: #94a3b8;
    }

    .container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 40px;
      padding: 40px 20px;
      max-width: 1400px;
      width: 100%;
      box-sizing: border-box;
    }

    /* Controls Panel */
    .controls {
      background: #0b0d11;
      border-radius: 16px;
      padding: 24px;
      width: 300px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.3);
      border: 1px solid #1e293b;
      align-self: flex-start;
    }

    .controls h2 {
      margin-top: 0;
      font-size: 18px;
      border-bottom: 1px solid #1e293b;
      padding-bottom: 10px;
      color: #f8fafc;
    }

    .control-group {
      margin-bottom: 18px;
    }

    .control-group label {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      color: #94a3b8;
      margin-bottom: 6px;
    }

    .control-group label span.val {
      color: #f8fafc;
      font-weight: 600;
    }

    .control-group input[type="range"] {
      width: 100%;
      accent-color: #3b82f6;
    }

    /* Showcase Grid */
    .showcase {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
      gap: 40px;
      flex: 1;
      width: 100%;
    }

    .variant-card {
      position: relative;
    }

    .variant-badge {
      position: absolute;
      top: -12px;
      left: 20px;
      background: #3b82f6;
      color: white;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      z-index: 10;
      box-shadow: 0 2px 5px rgba(0,0,0,0.2);
    }
  </style>
</head>
<body>

  <header>
    <h1>ha-airquality-card</h1>
    <p>Interaktiver Playground: 2 neue Design-Vorschläge (jeweils Light & Dark)</p>
  </header>

  <div class="container">
    <!-- Controls Panel -->
    <div class="controls">
      <h2>Sensor-Simulierung</h2>
      <div class="control-group">
        <label>Temperatur: <span class="val" id="val-temp">21.5 °C</span></label>
        <input type="range" id="slider-temp" min="10" max="35" step="0.5" value="21.5">
      </div>
      <div class="control-group">
        <label>Luftfeuchtigkeit: <span class="val" id="val-hum">48 %</span></label>
        <input type="range" id="slider-hum" min="10" max="100" step="1" value="48">
      </div>
      <div class="control-group">
        <label>CO₂-Wert: <span class="val" id="val-co2">412 ppm</span></label>
        <input type="range" id="slider-co2" min="300" max="2500" step="10" value="412">
      </div>
      <div class="control-group">
        <label>PM2.5 Staub: <span class="val" id="val-pm25">6.8 µg/m³</span></label>
        <input type="range" id="slider-pm25" min="0" max="80" step="0.5" value="6.8">
      </div>
    </div>

    <!-- Showcase Grid -->
    <div class="showcase">
      <!-- 1A: Neuomorphic Light -->
      <div class="variant-card">
        <span class="variant-badge" style="background: #e0e0e0; color: #333; border: 1px solid #ccc;">Soft UI Light</span>
        <div id="wrapper-neuomorphic-light"></div>
      </div>

      <!-- 1B: Neuomorphic Dark -->
      <div class="variant-card">
        <span class="variant-badge" style="background: #1e222b; color: #eee; border: 1px solid #444;">Soft UI Dark</span>
        <div id="wrapper-neuomorphic-dark"></div>
      </div>

      <!-- 2A: Swiss Grid Light -->
      <div class="variant-card">
        <span class="variant-badge" style="background: #000; color: #fff;">Swiss Grid Light</span>
        <div id="wrapper-swiss-light"></div>
      </div>

      <!-- 2B: Swiss Grid Dark -->
      <div class="variant-card">
        <span class="variant-badge" style="background: #fff; color: #000;">Swiss Grid Dark</span>
        <div id="wrapper-swiss-dark"></div>
      </div>
    </div>
  </div>

  <script>
    function co2Norm(v) {
      if (v <= 420) return 0.75;
      if (v < 800) return 0.75 + (v - 420) / 380 * 0.75;
      if (v < 1000) return 1.5 + (v - 800) / 200 * 1.0;
      if (v < 1400) return 2.5 + (v - 1000) / 400 * 1.0;
      if (v < 2000) return 3.5 + (v - 1400) / 600 * 1.0;
      return 5;
    }

    function pmNorm(v) {
      if (v <= 1) return 0.75;
      if (v <= 5) return 0.75 + (v - 1) / 4 * 0.75;
      if (v <= 15) return 1.5 + (v - 5) / 10 * 1.0;
      if (v <= 25) return 2.5 + (v - 15) / 10 * 1.0;
      if (v <= 50) return 3.5 + (v - 25) / 25 * 1.0;
      return 5;
    }

    function rhNorm(v) {
      const d = Math.abs(v - 50);
      if (d <= 10) return 0.75 + d / 10 * 0.75;
      if (d <= 25) return 1.5 + (d - 10) / 15 * 1.0;
      if (d <= 35) return 2.5 + (d - 25) / 10 * 1.0;
      if (d <= 45) return 3.5 + (d - 35) / 10 * 1.0;
      return 5;
    }

    function tempNorm(v, mid, half) {
      const d = Math.abs(v - mid);
      const safeHalf = half > 0 ? half : 0.01;
      if (d <= safeHalf) return 0.75 + (d / safeHalf) * 0.75;
      if (d <= safeHalf + 4) return 1.5 + (d - safeHalf) / 4 * 3.5;
      return 5;
    }

    function computeGrade(temp, hum, co2, pm25) {
      const co2N = co2Norm(co2);
      const pmN = pmNorm(pm25);
      const rhN = rhNorm(hum);
      const tN = tempNorm(temp, 21, 1);
      
      const wavg = co2N * 0.3 + pmN * 0.1 + rhN * 0.3 + tN * 0.3;
      const worst = Math.max(co2N, rhN, tN);
      return Math.round((0.6 * worst + 0.4 * wavg) * 10) / 10;
    }

    function getGradeColor(value) {
      const stops = [
        [1, [76, 175, 80]],
        [2, [139, 195, 74]],
        [3, [255, 193, 7]],
        [4, [255, 111, 0]],
        [5, [211, 47, 47]]
      ];
      const v = Math.min(5, Math.max(1, value));
      for (let i = 0; i < stops.length - 1; i++) {
        const p1 = stops[i][0], c1 = stops[i][1];
        const p2 = stops[i + 1][0], c2 = stops[i + 1][1];
        if (v >= p1 && v <= p2) {
          const t = (v - p1) / (p2 - p1);
          return c1.map((c, idx) => Math.round(c + (c2[idx] - c) * t));
        }
      }
      return stops[stops.length - 1][1];
    }

    function getGradeLabel(value) {
      if (value <= 1.5) return "Sehr gut";
      if (value <= 2.5) return "Gut";
      if (value <= 3.5) return "Befriedigend";
      if (value <= 4.5) return "Schwach";
      return "Schlecht";
    }

    function getStatusInfo(type, val) {
      if (type === 'temp') {
        if (val >= 20 && val <= 23) return { text: "Optimal", color: "#4caf50" };
        if (val >= 18 && val <= 25) return { text: "Gut", color: "#8bc34a" };
        if (val >= 16 && val <= 27) return { text: "Mäßig", color: "#ffc107" };
        return { text: "Schlecht", color: "#f44336" };
      }
      if (type === 'hum') {
        if (val >= 40 && val <= 60) return { text: "Gut", color: "#4caf50" };
        if (val >= 30 && val <= 70) return { text: "Mäßig", color: "#ffc107" };
        return { text: "Schlecht", color: "#f44336" };
      }
      if (type === 'co2') {
        if (val <= 800) return { text: "Gut", color: "#4caf50" };
        if (val <= 1200) return { text: "Mäßig", color: "#ffc107" };
        return { text: "Schlecht", color: "#f44336" };
      }
      if (type === 'pm25') {
        if (val <= 5) return { text: "Gut", color: "#4caf50" };
        if (val <= 15) return { text: "Mäßig", color: "#ffc107" };
        return { text: "Schlecht", color: "#f44336" };
      }
    }

    function updateAll() {
      const tempVal = parseFloat(document.getElementById('slider-temp').value);
      const humVal = parseInt(document.getElementById('slider-hum').value);
      const co2Val = parseInt(document.getElementById('slider-co2').value);
      const pmVal = parseFloat(document.getElementById('slider-pm25').value);

      document.getElementById('val-temp').innerText = `${tempVal.toFixed(1)} °C`;
      document.getElementById('val-hum').innerText = `${humVal} %`;
      document.getElementById('val-co2').innerText = `${co2Val} ppm`;
      document.getElementById('val-pm25').innerText = `${pmVal.toFixed(1)} µg/m³`;

      const grade = computeGrade(tempVal, humVal, co2Val, pmVal);
      const gradeCol = getGradeColor(grade);
      const gradeColorStr = `rgb(${gradeCol[0]}, ${gradeCol[1]}, ${gradeCol[2]})`;
      const gradeLabel = getGradeLabel(grade);

      const tStat = getStatusInfo('temp', tempVal);
      const hStat = getStatusInfo('hum', humVal);
      const cStat = getStatusInfo('co2', co2Val);
      const pStat = getStatusInfo('pm25', pmVal);

      const elevated = [];
      if (tempVal < 20 || tempVal > 23) elevated.push("die Temperatur");
      if (humVal < 40 || humVal > 60) elevated.push("die Luftfeuchtigkeit");
      if (co2Val > 800) elevated.push("der CO₂-Gehalt");
      if (pmVal > 5) elevated.push("die Feinstaubbelastung (PM2.5)");

      let whoStatusText = "";
      if (elevated.length === 0) {
        whoStatusText = "Der Raum-Mittelwert entspricht den aktuellen WHO-Vorgaben.";
      } else if (elevated.length === 1) {
        whoStatusText = `Der Raum-Mittelwert weicht ab: ${elevated[0]} ist erhöht.`;
      } else {
        whoStatusText = `Der Raum-Mittelwert weicht ab: ${elevated.slice(0, -1).join(", ")} und ${elevated[elevated.length - 1]} sind erhöht.`;
      }

      // 1. Soft UI Light
      document.getElementById('wrapper-neuomorphic-light').innerHTML = `
        <div style="background:#e6e9ef; border-radius:28px; padding:28px; color:#4a5568; box-shadow: 12px 12px 24px #d1d5db, -12px -12px 24px #ffffff; font-family:-apple-system, sans-serif;">
          <div style="font-size:16px; font-weight:700; text-align:center; color:#2d3748; margin-bottom:20px; text-transform:uppercase; letter-spacing:1px;">Wohnzimmer</div>
          
          <div style="display:flex; justify-content:center; margin-bottom:24px;">
            <div style="
              width:130px; height:130px; border-radius:50%;
              background:#e6e9ef;
              box-shadow: inset 8px 8px 16px #d1d5db, inset -8px -8px 16px #ffffff;
              display:flex; flex-direction:column; align-items:center; justify-content:center;
              position:relative;
            ">
              <!-- Glow ring representing air quality status -->
              <div style="position:absolute; width:116px; height:116px; border-radius:50%; border:3px solid ${gradeColorStr}; opacity:0.6; box-shadow: 0 0 10px ${gradeColorStr};"></div>
              <span style="font-size:36px; font-weight:800; color:#2d3748; line-height:1;">${grade.toFixed(1)}</span>
              <span style="font-size:9px; font-weight:700; color:#718096; text-transform:uppercase; margin-top:6px; letter-spacing:0.5px;">${gradeLabel}</span>
            </div>
          </div>

          <div style="display:grid; grid-template-columns:1fr 1fr; gap:16px;">
            <div style="background:#e6e9ef; border-radius:16px; padding:14px; box-shadow: 4px 4px 10px #d1d5db, -4px -4px 10px #ffffff; display:flex; flex-direction:column; align-items:center;">
              <span style="font-size:10px; font-weight:700; color:#718096;">Temperatur</span>
              <div style="font-size:18px; font-weight:700; color:#2d3748; margin-top:4px;">${tempVal.toFixed(1)}°C</div>
              <span style="font-size:8px; font-weight:700; color:${tStat.color}; text-transform:uppercase; margin-top:2px;">● ${tStat.text}</span>
            </div>
            <div style="background:#e6e9ef; border-radius:16px; padding:14px; box-shadow: 4px 4px 10px #d1d5db, -4px -4px 10px #ffffff; display:flex; flex-direction:column; align-items:center;">
              <span style="font-size:10px; font-weight:700; color:#718096;">Feuchtigkeit</span>
              <div style="font-size:18px; font-weight:700; color:#2d3748; margin-top:4px;">${humVal}%</div>
              <span style="font-size:8px; font-weight:700; color:${hStat.color}; text-transform:uppercase; margin-top:2px;">● ${hStat.text}</span>
            </div>
            <div style="background:#e6e9ef; border-radius:16px; padding:14px; box-shadow: 4px 4px 10px #d1d5db, -4px -4px 10px #ffffff; display:flex; flex-direction:column; align-items:center;">
              <span style="font-size:10px; font-weight:700; color:#718096;">CO₂</span>
              <div style="font-size:18px; font-weight:700; color:#2d3748; margin-top:4px;">${co2Val} ppm</div>
              <span style="font-size:8px; font-weight:700; color:${cStat.color}; text-transform:uppercase; margin-top:2px;">● ${cStat.text}</span>
            </div>
            <div style="background:#e6e9ef; border-radius:16px; padding:14px; box-shadow: 4px 4px 10px #d1d5db, -4px -4px 10px #ffffff; display:flex; flex-direction:column; align-items:center;">
              <span style="font-size:10px; font-weight:700; color:#718096;">PM2.5 Staub</span>
              <div style="font-size:18px; font-weight:700; color:#2d3748; margin-top:4px;">${pmVal.toFixed(1)}</div>
              <span style="font-size:8px; font-weight:700; color:${pStat.color}; text-transform:uppercase; margin-top:2px;">● ${pStat.text}</span>
            </div>
          </div>
        </div>
      `;

      // 2. Soft UI Dark
      document.getElementById('wrapper-neuomorphic-dark').innerHTML = `
        <div style="background:#1e222b; border-radius:28px; padding:28px; color:#a0aec0; box-shadow: 12px 12px 24px #12141a, -12px -12px 24px #2a303c; font-family:-apple-system, sans-serif;">
          <div style="font-size:16px; font-weight:700; text-align:center; color:#edf2f7; margin-bottom:20px; text-transform:uppercase; letter-spacing:1px;">Wohnzimmer</div>
          
          <div style="display:flex; justify-content:center; margin-bottom:24px;">
            <div style="
              width:130px; height:130px; border-radius:50%;
              background:#1e222b;
              box-shadow: inset 8px 8px 16px #12141a, inset -8px -8px 16px #2a303c;
              display:flex; flex-direction:column; align-items:center; justify-content:center;
              position:relative;
            ">
              <!-- Glow ring representing air quality status -->
              <div style="position:absolute; width:116px; height:116px; border-radius:50%; border:3px solid ${gradeColorStr}; opacity:0.8; box-shadow: 0 0 12px ${gradeColorStr};"></div>
              <span style="font-size:36px; font-weight:800; color:#edf2f7; line-height:1;">${grade.toFixed(1)}</span>
              <span style="font-size:9px; font-weight:700; color:#a0aec0; text-transform:uppercase; margin-top:6px; letter-spacing:0.5px;">${gradeLabel}</span>
            </div>
          </div>

          <div style="display:grid; grid-template-columns:1fr 1fr; gap:16px;">
            <div style="background:#1e222b; border-radius:16px; padding:14px; box-shadow: 4px 4px 10px #12141a, -4px -4px 10px #2a303c; display:flex; flex-direction:column; align-items:center;">
              <span style="font-size:10px; font-weight:700; color:#a0aec0;">Temperatur</span>
              <div style="font-size:18px; font-weight:700; color:#edf2f7; margin-top:4px;">${tempVal.toFixed(1)}°C</div>
              <span style="font-size:8px; font-weight:700; color:${tStat.color}; text-transform:uppercase; margin-top:2px;">● ${tStat.text}</span>
            </div>
            <div style="background:#1e222b; border-radius:16px; padding:14px; box-shadow: 4px 4px 10px #12141a, -4px -4px 10px #2a303c; display:flex; flex-direction:column; align-items:center;">
              <span style="font-size:10px; font-weight:700; color:#a0aec0;">Feuchtigkeit</span>
              <div style="font-size:18px; font-weight:700; color:#edf2f7; margin-top:4px;">${humVal}%</div>
              <span style="font-size:8px; font-weight:700; color:${hStat.color}; text-transform:uppercase; margin-top:2px;">● ${hStat.text}</span>
            </div>
            <div style="background:#1e222b; border-radius:16px; padding:14px; box-shadow: 4px 4px 10px #12141a, -4px -4px 10px #2a303c; display:flex; flex-direction:column; align-items:center;">
              <span style="font-size:10px; font-weight:700; color:#a0aec0;">CO₂</span>
              <div style="font-size:18px; font-weight:700; color:#edf2f7; margin-top:4px;">${co2Val} ppm</div>
              <span style="font-size:8px; font-weight:700; color:${cStat.color}; text-transform:uppercase; margin-top:2px;">● ${cStat.text}</span>
            </div>
            <div style="background:#1e222b; border-radius:16px; padding:14px; box-shadow: 4px 4px 10px #12141a, -4px -4px 10px #2a303c; display:flex; flex-direction:column; align-items:center;">
              <span style="font-size:10px; font-weight:700; color:#a0aec0;">PM2.5 Staub</span>
              <div style="font-size:18px; font-weight:700; color:#edf2f7; margin-top:4px;">${pmVal.toFixed(1)}</div>
              <span style="font-size:8px; font-weight:700; color:${pStat.color}; text-transform:uppercase; margin-top:2px;">● ${pStat.text}</span>
            </div>
          </div>
        </div>
      `;

      // 3. Swiss Grid Light
      document.getElementById('wrapper-swiss-light').innerHTML = `
        <div style="background:#ffffff; border:1px solid #d1d5db; padding:24px; color:#000000; font-family:'Helvetica Neue', Helvetica, Arial, sans-serif; box-sizing:border-box;">
          <div style="font-size:14px; font-weight:700; text-transform:uppercase; letter-spacing:0.5px; border-bottom:1px solid #d1d5db; padding-bottom:8px; margin-bottom:20px;">
            Luftgüte &amp; Klima: Wohnzimmer
          </div>
          
          <div style="display:flex; align-items:center; gap:20px; margin-bottom:20px; border-bottom:1px solid #d1d5db; padding-bottom:20px;">
            <div style="width:120px; height:120px; border-radius:50%; border:1px solid #d1d5db; display:flex; flex-direction:column; align-items:center; justify-content:center;">
              <span style="font-size:48px; font-weight:700; letter-spacing:-1px;">${grade.toFixed(1)}</span>
              <span style="font-size:9px; text-transform:uppercase; letter-spacing:1px; color:#4b5563;">Index</span>
            </div>
            <div style="flex:1;">
              <div style="font-size:16px; font-weight:700; text-transform:uppercase; color:${gradeColorStr};">${gradeLabel}</div>
              <div style="font-size:11px; color:#4b5563; margin-top:4px; line-height:1.4;">${whoStatusText}</div>
            </div>
          </div>

          <div style="display:grid; grid-template-columns:1fr 1fr; gap:1px; background:#d1d5db; border:1px solid #d1d5db;">
            <div style="background:#ffffff; padding:12px; display:flex; align-items:center; gap:8px;">
              <div style="width:4px; height:24px; background:${tStat.color};"></div>
              <div>
                <div style="font-size:9px; text-transform:uppercase; color:#4b5563; font-weight:700;">TEMP</div>
                <div style="font-size:14px; font-weight:700;">${tempVal.toFixed(1)}°C</div>
              </div>
            </div>
            <div style="background:#ffffff; padding:12px; display:flex; align-items:center; gap:8px;">
              <div style="width:4px; height:24px; background:${hStat.color};"></div>
              <div>
                <div style="font-size:9px; text-transform:uppercase; color:#4b5563; font-weight:700;">FEUCHT</div>
                <div style="font-size:14px; font-weight:700;">${humVal}%</div>
              </div>
            </div>
            <div style="background:#ffffff; padding:12px; display:flex; align-items:center; gap:8px;">
              <div style="width:4px; height:24px; background:${cStat.color};"></div>
              <div>
                <div style="font-size:9px; text-transform:uppercase; color:#4b5563; font-weight:700;">CO2</div>
                <div style="font-size:14px; font-weight:700;">${co2Val} ppm</div>
              </div>
            </div>
            <div style="background:#ffffff; padding:12px; display:flex; align-items:center; gap:8px;">
              <div style="width:4px; height:24px; background:${pStat.color};"></div>
              <div>
                <div style="font-size:9px; text-transform:uppercase; color:#4b5563; font-weight:700;">PM2.5</div>
                <div style="font-size:14px; font-weight:700;">${pmVal.toFixed(1)}</div>
              </div>
            </div>
          </div>
        </div>
      `;

      // 4. Swiss Grid Dark
      document.getElementById('wrapper-swiss-dark').innerHTML = `
        <div style="background:#0b0f19; border:1px solid #1e293b; padding:24px; color:#ffffff; font-family:'Helvetica Neue', Helvetica, Arial, sans-serif; box-sizing:border-box;">
          <div style="font-size:14px; font-weight:700; text-transform:uppercase; letter-spacing:0.5px; border-bottom:1px solid #1e293b; padding-bottom:8px; margin-bottom:20px; color:#f8fafc;">
            Luftgüte &amp; Klima: Wohnzimmer
          </div>
          
          <div style="display:flex; align-items:center; gap:20px; margin-bottom:20px; border-bottom:1px solid #1e293b; padding-bottom:20px;">
            <div style="width:120px; height:120px; border-radius:50%; border:1px solid #1e293b; display:flex; flex-direction:column; align-items:center; justify-content:center;">
              <span style="font-size:48px; font-weight:700; letter-spacing:-1px; color:#ffffff;">${grade.toFixed(1)}</span>
              <span style="font-size:9px; text-transform:uppercase; letter-spacing:1px; color:#94a3b8;">Index</span>
            </div>
            <div style="flex:1;">
              <div style="font-size:16px; font-weight:700; text-transform:uppercase; color:${gradeColorStr};">${gradeLabel}</div>
              <div style="font-size:11px; color:#94a3b8; margin-top:4px; line-height:1.4;">${whoStatusText}</div>
            </div>
          </div>

          <div style="display:grid; grid-template-columns:1fr 1fr; gap:1px; background:#1e293b; border:1px solid #1e293b;">
            <div style="background:#0b0f19; padding:12px; display:flex; align-items:center; gap:8px;">
              <div style="width:4px; height:24px; background:${tStat.color};"></div>
              <div>
                <div style="font-size:9px; text-transform:uppercase; color:#94a3b8; font-weight:700;">TEMP</div>
                <div style="font-size:14px; font-weight:700; color:#ffffff;">${tempVal.toFixed(1)}°C</div>
              </div>
            </div>
            <div style="background:#0b0f19; padding:12px; display:flex; align-items:center; gap:8px;">
              <div style="width:4px; height:24px; background:${hStat.color};"></div>
              <div>
                <div style="font-size:9px; text-transform:uppercase; color:#94a3b8; font-weight:700;">FEUCHT</div>
                <div style="font-size:14px; font-weight:700; color:#ffffff;">${humVal}%</div>
              </div>
            </div>
            <div style="background:#0b0f19; padding:12px; display:flex; align-items:center; gap:8px;">
              <div style="width:4px; height:24px; background:${cStat.color};"></div>
              <div>
                <div style="font-size:9px; text-transform:uppercase; color:#94a3b8; font-weight:700;">CO2</div>
                <div style="font-size:14px; font-weight:700; color:#ffffff;">${co2Val} ppm</div>
              </div>
            </div>
            <div style="background:#0b0f19; padding:12px; display:flex; align-items:center; gap:8px;">
              <div style="width:4px; height:24px; background:${pStat.color};"></div>
              <div>
                <div style="font-size:9px; text-transform:uppercase; color:#94a3b8; font-weight:700;">PM2.5</div>
                <div style="font-size:14px; font-weight:700; color:#ffffff;">${pmVal.toFixed(1)}</div>
              </div>
            </div>
          </div>
        </div>
      `;
    }

    const sliders = ['slider-temp', 'slider-hum', 'slider-co2', 'slider-pm25'];
    sliders.forEach(id => {
      document.getElementById(id).addEventListener('input', updateAll);
    });

    updateAll();
  </script>
</body>
</html>
